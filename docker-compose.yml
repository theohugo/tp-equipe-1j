services:
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: assistkb_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333' && exit 0 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: assistkb_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama-start.sh:/ollama-start.sh
    entrypoint: ["/bin/sh", "/ollama-start.sh"]
    healthcheck:
      # Healthy seulement quand le modèle est téléchargé et prêt
      test: ["CMD-SHELL", "ollama list 2>/dev/null | grep -q 'llama3.2' && exit 0 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 120
      start_period: 30s
    restart: unless-stopped

  api:
    build: .
    container_name: assistkb_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./corpus:/app/corpus
    depends_on:
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      # start_period couvre ingest + embed (chargement du modèle d'embedding ~60s + vectorisation)
      start_period: 300s
    restart: unless-stopped

volumes:
  qdrant_data:
  ollama_data:
