name: CI

on:
  push:
    branches: ["projet-A/**", "main"]
  pull_request:
    branches: ["main"]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check imports (syntax)
        run: python -c "import app.config, app.store, app.metrics"

      - name: Run unit tests (if any)
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest tests/ -v
          else
            echo "Aucun test trouvé — OK pour l'instant"
          fi

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t assistkb-api:ci .
